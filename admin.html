<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Dashboard | Lumina Beauty Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html"><span class="brand-mark">L</span><span>Lumina Beauty Studio</span></a>
    <nav class="main-nav dashboard-nav" aria-label="Dashboard navigation">
      <a href="index.html">Website</a>
      <a class="active" href="admin.html">Dashboard</a>
    </nav>
  </header>

  <main class="dashboard">
    <section class="dashboard-heading">
      <p class="eyebrow">Owner area</p>
      <h1>Bookings and feedback</h1>
      <button class="primary-btn" id="refresh-dashboard">Refresh</button>
    </section>

    <section class="dashboard-grid">
      <div class="dashboard-panel">
        <h2>Recent Bookings</h2>
        <div class="records-list" id="bookings-list">
          <p class="empty-state">Loading bookings...</p>
        </div>
      </div>

      <div class="dashboard-panel">
        <h2>Recent Feedback</h2>
        <div class="records-list" id="feedback-list">
          <p class="empty-state">Loading feedback...</p>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js?v=4"></script>
</body>
</html>
